<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servers Tracker</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#05080f;
    color:white;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.header{
    background:#0b1220;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.filter-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

select{
    padding:8px;
    background:#0b1220;
    color:white;
    border:1px solid #1c2a44;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0b1220;
}

th, td{
    padding:10px;
    border-bottom:1px solid #1c2a44;
}

.status{
    padding:4px 10px;
    border-radius:6px;
    font-weight:bold;
}

.online{background:#0f5132;color:#00ffae;}
.upcoming{background:#664d03;color:#ffd700;}
.closed{background:#842029;color:#ff6b6b;}

.btn-link{
    background:#00e0ff;
    color:black;
    padding:5px 10px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Servers Tracker</h2>
</div>

<div class="filter-bar">
<select onchange="filterServers(this.value)">
<option value="all">All</option>
<option value="online">Online</option>
<option value="upcoming">Upcoming</option>
<option value="closed">Closed</option>
</select>

<select onchange="sortServers(this.value)">
<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
</select>
</div>

<table id="table">
<thead>
<tr>
<th>Server</th>
<th>Owner</th>
<th>Launch</th>
<th>Uptime</th>
<th>Status</th>
<th>Website</th>
<th>Discord</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEgo-sYLiHKhWQlswaoM7HsMJ4zuc4KRZzoGfAAyewEmyEiX6OAozrsOiVEyueVdQaXSqqq5RCGUhy/pub?output=csv";

let currentFilter="all";
let currentSort="newest";

function fetchData(){
fetch(CSV_URL)
.then(res => res.text())
.then(csv => {

let rows = csv.split("\n").slice(1);
let html = "";

rows.forEach(row=>{

let cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
if(!cols) return;

cols = cols.map(c => c.replace(/"/g,""));

let name = cols[3];
let owner = cols[4];
let date = cols[5];
let status = (cols[6] || "upcoming").toLowerCase();
let website = cols[7];
let discord = cols[8];

if(!name) return;

html += `
<tr data-status="${status}" data-date="${date}">
<td>${name}</td>
<td>${owner}</td>
<td>${formatDate(date)}</td>
<td class="uptime"></td>
<td><span class="status ${status}">${capitalize(status)}</span></td>
<td>${website ? `<a class="btn-link" href="${website}" target="_blank">Visit</a>` : "-"}</td>
<td>${discord ? `<a class="btn-link" href="${discord}" target="_blank">Join</a>` : "-"}</td>
</tr>`;
});

document.getElementById("tableBody").innerHTML = html;

apply();
updateUptime();
});
}

function filterServers(s){
currentFilter=s;
apply();
}

function sortServers(s){
currentSort=s;
apply();
}

function apply(){
let t=document.querySelector("#table tbody");
let rows=[...t.querySelectorAll("tr")];

rows.forEach(r=>{
r.style.display=(currentFilter==="all"||r.dataset.status===currentFilter)?"":"none";
});

rows.sort((a,b)=>{
return currentSort==="newest"
? new Date(b.dataset.date)-new Date(a.dataset.date)
: new Date(a.dataset.date)-new Date(b.dataset.date);
});

rows.forEach(r=>t.appendChild(r));
}

function calculateUptime(date){
const now = new Date();
const start = new Date(date);
let diff = Math.floor((now - start)/86400000);

if(diff < 1) return "few hours";
if(diff === 1) return "1 day";
if(diff < 7) return diff + " days";

let w = Math.floor(diff/7);
if(w < 4) return w + " weeks";

let m = Math.floor(diff/30);
if(m < 12) return m + " months";

return Math.floor(diff/365) + " years";
}

function updateUptime(){
const now = new Date();

document.querySelectorAll("#table tbody tr").forEach(row=>{
let date = new Date(row.dataset.date);
let status = row.dataset.status;

let uptime = row.querySelector(".uptime");
let statusEl = row.querySelector(".status");

if(status==="upcoming" && now >= date){
row.dataset.status="online";
statusEl.className="status online";
statusEl.innerText="Online";
status="online";
}

uptime.innerText = status==="online" ? calculateUptime(date) : "-";
});
}

function formatDate(d){
return new Date(d).toLocaleDateString("en-US");
}

function capitalize(s){
return s.charAt(0).toUpperCase()+s.slice(1);
}

// INIT
fetchData();
setInterval(updateUptime,1000);
</script>

</body>
</html>
